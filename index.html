<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>r/nasa Viewer</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f1a;
    color: #fff;
  }

  header {
    padding: 12px;
    background: #111827;
    position: sticky;
    top: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  header h1 {
    font-size: 16px;
    margin: 0;
  }

  button {
    padding: 6px 10px;
    border: none;
    background: #2563eb;
    color: white;
    border-radius: 6px;
    cursor: pointer;
  }

  #posts {
    padding: 10px;
  }

  .post {
    background: #111827;
    margin-bottom: 10px;
    padding: 10px;
    border-radius: 10px;
  }

  .title {
    font-size: 14px;
    font-weight: bold;
  }

  .meta {
    font-size: 11px;
    color: #9ca3af;
    margin-top: 4px;
  }

  a {
    color: #60a5fa;
    text-decoration: none;
  }

  img {
    max-width: 100%;
    border-radius: 8px;
    margin-top: 8px;
  }
</style>
</head>
<body>

<header>
  <h1>r/nasa</h1>
  <button onclick="loadPosts()">Refresh</button>
</header>

<div id="posts">Loading...</div>

<script>
async function loadPosts() {
  const container = document.getElementById('posts');
  container.innerHTML = "Loading...";

  try {
    const res = await fetch("https://www.reddit.com/r/nasa.json", {
      headers: {
        "User-Agent": "simple-web-app"
      }
    });

    const json = await res.json();
    const posts = json.data.children;

    container.innerHTML = "";

    posts.forEach(p => {
      const data = p.data;

      const post = document.createElement('div');
      post.className = "post";

      const title = document.createElement('div');
      title.className = "title";

      const link = document.createElement('a');
      link.href = "https://reddit.com" + data.permalink;
      link.target = "_blank";
      link.textContent = data.title;

      title.appendChild(link);

      const meta = document.createElement('div');
      meta.className = "meta";
      meta.textContent = `👍 ${data.ups} | 💬 ${data.num_comments}`;

      post.appendChild(title);
      post.appendChild(meta);

      // image preview (if available)
      if (data.preview && data.preview.images && data.preview.images[0]) {
        const img = document.createElement('img');
        img.src = data.preview.images[0].source.url.replace(/&amp;/g, '&');
        post.appendChild(img);
      }

      container.appendChild(post);
    });

  } catch (e) {
    container.innerHTML = "Failed to load posts.";
    console.error(e);
  }
}

loadPosts();
</script>

</body>
</html>
